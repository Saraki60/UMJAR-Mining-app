<!DOCTYPE html>
<html>
<head>

<style>
body{
background:#000;
color:white;
font-family:Arial;
margin:0;
padding:0;
}

.header{

padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:gold;

}

.container{
padding:20px;
}

.card{
background:#111;
border:2px solid gold;
border-radius:20px;
padding:20px;

.balance{

font-weight:bold;

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.box{
background:#1a1a1a;
padding:20px;
border-radius:15px;
text-align:center;
border:1px solid #333;

.small{
font-size:14px;

}

</head>

<body>

<div class="header">
UMJAR Mining
</div>

<button>
Start Mining

<div class="grid">

<div class="box">
⚡

let balance = 245.85;

function startMining() {

    balance += 0.01;
    document.getElementById("balance").innerHTML =
      balance.toFixed(2) + " UMJAR";

}
