<script>

let balance =
parseInt(localStorage.getItem("umjarBalance")) || 0;

let mining =
localStorage.getItem("mining") === "true";

let miningTime =
parseInt(localStorage.getItem("miningTime")) || 86400;

let miningInterval = null;
let timerInterval = null;

updateBalance();
updateTimer();

if(mining){
document.getElementById("status").innerHTML =
"Mining Active";
startIntervals();
}

function updateBalance(){

if(isNaN(balance)){
balance = 0;
}

document.getElementById("balance").innerHTML =
balance + " UMJ";

let wallet =
document.getElementById("walletBalance");

if(wallet){
wallet.innerHTML = balance;
}

localStorage.setItem("umjarBalance", balance);

}

function updateTimer(){

if(miningTime < 0){
miningTime = 0;
}

let hours =
Math.floor(miningTime / 3600);

let minutes =
Math.floor((miningTime % 3600) / 60);

let seconds =
miningTime % 60;

document.getElementById("timer").innerHTML =
String(hours).padStart(2,"0") + ":" +
String(minutes).padStart(2,"0") + ":" +
String(seconds).padStart(2,"0");

}

function startMining(){

if(mining){
alert("Mining Already Running");
return;
}

mining = true;

miningTime = 86400;

localStorage.setItem("mining","true");
localStorage.setItem("miningTime",miningTime);

document.getElementById("status").innerHTML =
"Mining Active";

alert("24H Mining Started");

startIntervals();

}

function startIntervals(){

clearInterval(miningInterval);
clearInterval(timerInterval);

miningInterval = setInterval(function(){

balance += 2;

updateBalance();

},5000);

timerInterval = setInterval(function(){

if(miningTime <= 0){

clearInterval(miningInterval);
clearInterval(timerInterval);

mining = false;

localStorage.setItem("mining","false");

document.getElementById("status").innerHTML =
"Mining Finished";

return;

}

miningTime--;

localStorage.setItem("miningTime", miningTime);

updateTimer();

},1000);

}

function dailyBonus(){

let today =
new Date().toDateString();

let claimed =
localStorage.getItem("bonusDate");

if(claimed === today){

alert("Bonus Already Claimed Today");

return;

}

balance += 100;

updateBalance();

localStorage.setItem("bonusDate", today);

alert("100 UMJ Added");

}

function openMall(){

alert("UMJAR Mall Opened");

}

function startInvestment(){

if(balance < 500){

alert("You Need 500 UMJ");

return;

}

balance -= 500;

updateBalance();

alert("Investment Started");

}

function buyNFT(price){

if(balance < price){

alert("Not Enough UMJ");

return;

}

balance -= price;

updateBalance();

alert("NFT Purchased");

}

function copyLink(){

let text =
document.getElementById("refLink").innerText;

if(navigator.clipboard){

navigator.clipboard.writeText(text)
.then(function(){

alert("Referral Link Copied");

})
.catch(function(){

alert(text);

});

}else{

alert(text);

}

}

function withdrawUMJ(){

if(balance < 1000){

alert("Minimum Withdrawal Is 1000 UMJ");

return;

}

alert("Withdrawal Request Sent");

}

</script>
