<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UMJAR EXCHANGE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111214;
color:white;
padding:15px;
padding-bottom:110px;
}

.app{
max-width:430px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
font-size:34px;
font-weight:bold;
color:#f7c948;
}

.profile{
width:45px;
height:45px;
border-radius:50%;
background:#222;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
}

.balanceBox{
background:linear-gradient(145deg,#1d1f24,#16171b);
padding:25px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.06);
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.balanceTitle{
color:#aaa;
font-size:14px;
}

.balance{
font-size:45px;
font-weight:bold;
margin-top:10px;
color:#f7c948;
}

.miningCircle{
width:180px;
height:180px;
margin:30px auto;
border-radius:50%;
background:
conic-gradient(#f7c948 0deg,#2a2d35 0deg);
display:flex;
align-items:center;
justify-content:center;
position:relative;
box-shadow:0 0 30px rgba(247,201,72,0.15);
}

.miningCircle::before{
content:"";
position:absolute;
width:135px;
height:135px;
background:#16171b;
border-radius:50%;
}

.mineText{
position:relative;
z-index:2;
font-size:22px;
font-weight:bold;
color:#f7c948;
}

.timer{
text-align:center;
font-size:30px;
margin-top:15px;
color:#f7c948;
}

.status{
text-align:center;
margin-top:8px;
color:#00ff99;
}

button{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:18px;
font-size:16px;
font-weight:bold;
cursor:pointer;
background:#f7c948;
color:black;
}

input{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:16px;
background:#1d1f24;
color:white;
font-size:15px;
outline:none;
}

.market{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.marketCard{
background:#1a1b20;
padding:18px;
border-radius:22px;
border:1px solid rgba(255,255,255,0.05);
}

.marketCard h3{
font-size:15px;
color:#ccc;
}

.price{
font-size:22px;
margin-top:10px;
font-weight:bold;
}

.green{
color:#00ff99;
}

.red{
color:#ff4d6d;
}

.section{
background:#1a1b20;
padding:22px;
border-radius:25px;
margin-top:20px;
border:1px solid rgba(255,255,255,0.05);
}

.section h2{
margin-bottom:15px;
font-size:20px;
color:#f7c948;
}

.row{
display:flex;
justify-content:space-between;
margin-top:12px;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
max-width:430px;
margin:auto;
background:#18191d;
display:flex;
justify-content:space-around;
padding:18px;
border-radius:25px 25px 0 0;
border-top:1px solid rgba(255,255,255,0.05);
}

.nav div{
text-align:center;
font-size:13px;
color:#f7c948;
}

.user{
margin-top:15px;
color:#00ff99;
text-align:center;
}

</style>
</head>

<body>

<div class="app">

<div class="topbar">

<div class="logo">
UMJAR
</div>

<div class="profile">
👤
</div>

</div>

<div class="balanceBox">

<div class="balanceTitle">
Total Balance
</div>

<div class="balance" id="balance">
0 UMJ
</div>

<div class="user" id="userEmail">
Not Logged In
</div>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">
SIGN UP
</button>

<button onclick="login()">
LOGIN
</button>

<button onclick="logout()">
LOGOUT
</button>

<div class="miningCircle">

<div class="mineText">
MINING
</div>

</div>

<div class="timer" id="timer">
24:00:00
</div>

<div class="status" id="status">
Mining Not Started
</div>

<button onclick="startMining()">
START MINING
</button>

<button onclick="dailyBonus()">
DAILY BONUS
</button>

</div>

<div class="market">

<div class="marketCard">

<h3>BTC/USDT</h3>

<div class="price">
$105,420
</div>

<div class="green">
+2.4%
</div>

</div>

<div class="marketCard">

<h3>UMJ/USDT</h3>

<div class="price">
$2.45
</div>

<div class="green">
+18.2%
</div>

</div>

</div>

<div class="section">

<h2>
WALLET
</h2>

<div class="row">
<div>Available</div>
<div id="walletBalance">
0 UMJ
</div>
</div>

<button onclick="withdrawUMJ()">
WITHDRAW
</button>

</div>

<div class="section">

<h2>
UMJAR MALL
</h2>

<button onclick="openMall()">
OPEN MALL
</button>

</div>

<div class="section">

<h2>
INVESTMENT
</h2>

<button onclick="startInvestment()">
START INVESTMENT
</button>

</div>

<div class="section">

<h2>
NFT MARKETPLACE
</h2>

<button onclick="buyNFT(500)">
BUY NFT
</button>

</div>

<div class="section">

<h2>
REFERRAL
</h2>

<div class="row">
<div>Your Invite</div>
<div>
UMJ001
</div>
</div>

<button onclick="copyLink()">
COPY LINK
</button>

</div>

</div>

<div class="nav">

<div>
🏠<br>Home
</div>

<div>
📈<br>Markets
</div>

<div>
⛏️<br>Mining
</div>

<div>
💰<br>Wallet
</div>

<div>
👤<br>Profile
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAmLTvCWirFSpbpEpQTDX-4p3JAarIr3R4",

authDomain: "umjar-mining.firebaseapp.com",

projectId: "umjar-mining",

storageBucket: "umjar-mining.firebasestorage.app",

messagingSenderId: "908328509401",

appId: "1:908328509401:web:7e7e8ceb078efe500c43c8"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{

alert("Account Created");

})

.catch((error)=>{

alert(error.message);

});

}

window.login = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

alert("Login Successful");

})

.catch((error)=>{

alert(error.message);

});

}

window.logout = function(){

signOut(auth)

.then(()=>{

alert("Logged Out");

});

}

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("userEmail").innerHTML =
user.email;

}else{

document.getElementById("userEmail").innerHTML =
"Not Logged In";

}

});

let balance =
parseInt(localStorage.getItem("umjarBalance")) || 0;

let mining =
localStorage.getItem("mining") === "true";

let miningTime =
parseInt(localStorage.getItem("miningTime")) || 86400;

let miningInterval = null;
let timerInterval = null;

updateBalance();
updateTimer();

if(mining){

document.getElementById("status").innerHTML =
"Mining Active";

startIntervals();

}

function updateBalance(){

document.getElementById("balance").innerHTML =
balance + " UMJ";

document.getElementById("walletBalance").innerHTML =
balance + " UMJ";

localStorage.setItem("umjarBalance",balance);

}

function updateTimer(){

let h =
Math.floor(miningTime/3600);

let m =
Math.floor((miningTime%3600)/60);

let s =
miningTime%60;

document.getElementById("timer").innerHTML =
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

}

window.startMining = function(){

if(mining){

alert("Mining Already Running");

return;

}

mining = true;

localStorage.setItem("mining","true");

document.getElementById("status").innerHTML =
"Mining Active";

startIntervals();

}

function startIntervals(){

clearInterval(miningInterval);
clearInterval(timerInterval);

miningInterval = setInterval(()=>{

balance += 2;

updateBalance();

},5000);

timerInterval = setInterval(()=>{

if(miningTime <= 0){

clearInterval(miningInterval);
clearInterval(timerInterval);

mining = false;

localStorage.setItem("mining","false");

document.getElementById("status").innerHTML =
"Mining Finished";

return;

}

miningTime--;

localStorage.setItem("miningTime",miningTime);

updateTimer();

},1000);

}

window.dailyBonus = function(){

balance += 100;

updateBalance();

alert("100 UMJ Added");

}

window.copyLink = function(){

navigator.clipboard.writeText(
"https://umjar.app/ref/UMJ001"
);

alert("Referral Link Copied");

}

window.startInvestment = function(){

if(balance < 500){

alert("You Need 500 UMJ");

return;

}

balance -= 500;

updateBalance();

alert("Investment Started");

}

window.buyNFT = function(price){

if(balance < price){

alert("Not Enough UMJ");

return;

}

balance -= price;

updateBalance();

alert("NFT Purchased");

}

window.withdrawUMJ = function(){

if(balance < 1000){

alert("Minimum Withdrawal Is 1000 UMJ");

return;

}

alert("Withdrawal Request Sent");

}

window.openMall = function(){

alert("UMJAR Mall Opened");

}

</script>

</body>
</html>
