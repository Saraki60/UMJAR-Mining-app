<!-- KA BAR FIREBASE + JAVASCRIPT ORIGINAL DINKA -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UMJAR PREMIUM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
background-image:
linear-gradient(to bottom,#1b1400,#0d0d0d);
color:white;
padding:15px;
}

.app{
max-width:430px;
margin:auto;
padding-bottom:100px;
}

.box{
background:rgba(24,24,24,0.96);
backdrop-filter:blur(12px);
border:1px solid rgba(255,215,0,0.12);
border-radius:32px;
padding:22px;
margin-top:20px;
box-shadow:0 0 25px rgba(255,215,0,0.05);
}

.logo{
font-size:54px;
font-weight:bold;
text-align:center;
color:#ffd700;
letter-spacing:4px;
text-shadow:0 0 20px rgba(255,215,0,0.45);
}

.small{
text-align:center;
margin-top:5px;
color:#ddd;
font-size:14px;
}

.user{
margin-top:15px;
text-align:center;
color:#00ff99;
font-size:14px;
}

input{
width:100%;
padding:16px;
margin-top:14px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,215,0,0.1);
color:white;
font-size:15px;
}

button{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:22px;
background:linear-gradient(145deg,#ffd700,#ffb300);
color:black;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(255,215,0,0.2);
}

button:hover{
transform:scale(1.02);
}

.balance{
font-size:58px;
font-weight:bold;
text-align:center;
margin-top:25px;
color:#ffd700;
}

.timer{
font-size:32px;
text-align:center;
margin-top:20px;
color:#ffd700;
}

.status{
margin-top:10px;
text-align:center;
color:#00ff99;
font-size:15px;
}

.circle{
width:190px;
height:190px;
margin:28px auto;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
background:
conic-gradient(#ffd700 0deg,#2a2a2a 0deg);
position:relative;
box-shadow:
0 0 35px rgba(255,215,0,0.22);
}

.circle::before{
content:"";
position:absolute;
width:145px;
height:145px;
background:#101010;
border-radius:50%;
}

.circleText{
position:relative;
z-index:2;
font-size:22px;
font-weight:bold;
color:#ffd700;
}

.row{
display:flex;
justify-content:space-between;
margin-top:12px;
}

.green{
color:#00ff99;
font-weight:bold;
}

.banner{
margin-top:20px;
padding:24px;
border-radius:30px;
background:
linear-gradient(to right,#2a1f00,#141414);
border:1px solid rgba(255,215,0,0.12);
}

.banner h2{
color:#ffd700;
margin-bottom:10px;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
max-width:430px;
margin:auto;
background:rgba(20,20,20,0.98);
padding:16px;
display:flex;
justify-content:space-around;
border-radius:28px 28px 0 0;
border-top:1px solid rgba(255,215,0,0.1);
backdrop-filter:blur(12px);
}

.nav div{
text-align:center;
font-size:13px;
color:#ffd700;
}

</style>
</head>

<body>

<div class="app">

<div class="box">

<div class="logo">
UMJAR
</div>

<div class="small">
PREMIUM REAL MINING
</div>

<div class="user" id="userEmail">
Not Logged In
</div>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">
SIGN UP
</button>

<button onclick="login()">
LOGIN
</button>

<button onclick="logout()">
LOGOUT
</button>

<div class="balance" id="balance">
0 UMJ
</div>

<div class="circle">

<div class="circleText">
MINING
</div>

</div>

<div class="timer" id="timer">
24:00:00
</div>

<div class="status" id="status">
Mining Not Started
</div>

<button onclick="startMining()">
START MINING
</button>

<button onclick="dailyBonus()">
DAILY BONUS
</button>

</div>

<div class="box">

<h2 style="color:#ffd700;">
MINING STATS
</h2>

<div class="row">
<div>Today Mining</div>

<div class="green">
+1.2500 UMJ
</div>
</div>

<div class="row">
<div>Total Mined</div>

<div id="walletBalance">
0 UMJ
</div>
</div>

</div>

<div class="banner">

<h2>
INVITE & EARN BIG
</h2>

<p>
Invite friends and earn commissions.
</p>

<button onclick="copyLink()">
INVITE NOW
</button>

</div>

<div class="box">

<h2 style="color:#ffd700;">
WALLET
</h2>

<button onclick="withdrawUMJ()">
WITHDRAW
</button>

</div>

<div class="box">

<h2 style="color:#ffd700;">
INVESTMENT
</h2>

<button onclick="startInvestment()">
START INVESTMENT
</button>

</div>

<div class="box">

<h2 style="color:#ffd700;">
NFT MARKETPLACE
</h2>

<button onclick="buyNFT(500)">
BUY NFT
</button>

</div>

</div>

<div class="nav">

<div>
🏠<br>Home
</div>

<div>
⛏️<br>Mining
</div>

<div>
💰<br>Wallet
</div>

<div>
👤<br>Profile
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAmLTvCWirFSpbpEpQTDX-4p3JAarIr3R4",

authDomain: "umjar-mining.firebaseapp.com",

projectId: "umjar-mining",

storageBucket: "umjar-mining.firebasestorage.app",

messagingSenderId: "908328509401",

appId: "1:908328509401:web:7e7e8ceb078efe500c43c8",

measurementId: "G-TE3NN8W0HT"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.signup = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then(() => {

alert("Account Created");

})

.catch((error) => {

alert(error.message);

});

}

window.login = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(() => {

alert("Login Successful");

})

.catch((error) => {

alert(error.message);

});

}

window.logout = function(){

signOut(auth)

.then(() => {

alert("Logged Out");

});

}

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("userEmail").innerHTML =
user.email;

}else{

document.getElementById("userEmail").innerHTML =
"Not Logged In";

}

});

let balance =
parseInt(localStorage.getItem("umjarBalance")) || 0;

let mining =
localStorage.getItem("mining") === "true";

let miningTime =
parseInt(localStorage.getItem("miningTime")) || 86400;

let miningInterval = null;
let timerInterval = null;

updateBalance();
updateTimer();

if(mining){

document.getElementById("status").innerHTML =
"Mining Active";

startIntervals();

}

window.updateBalance = function(){

if(isNaN(balance)){
balance = 0;
}

document.getElementById("balance").innerHTML =
balance + " UMJ";

document.getElementById("walletBalance").innerHTML =
balance + " UMJ";

localStorage.setItem("umjarBalance", balance);

}

window.updateTimer = function(){

let hours =
Math.floor(miningTime / 3600);

let minutes =
Math.floor((miningTime % 3600) / 60);

let seconds =
miningTime % 60;

document.getElementById("timer").innerHTML =
String(hours).padStart(2,"0") + ":" +
String(minutes).padStart(2,"0") + ":" +
String(seconds).padStart(2,"0");

}

window.startMining = function(){

if(mining){

alert("Mining Already Running");

return;

}

mining = true;

document.getElementById("status").innerHTML =
"Mining Active";

startIntervals();

}

window.startIntervals = function(){

clearInterval(miningInterval);
clearInterval(timerInterval);

miningInterval = setInterval(function(){

balance += 2;

updateBalance();

},5000);

timerInterval = setInterval(function(){

if(miningTime <= 0){

clearInterval(miningInterval);
clearInterval(timerInterval);

mining = false;

document.getElementById("status").innerHTML =
"Mining Finished";

return;

}

miningTime--;

localStorage.setItem("miningTime", miningTime);

updateTimer();

},1000);

}

window.dailyBonus = function(){

balance += 100;

updateBalance();

alert("100 UMJ Added");

}

window.copyLink = function(){

navigator.clipboard.writeText(
"https://umjar.app/ref/UMJ001"
);

alert("Referral Link Copied");

}

window.withdrawUMJ = function(){

if(balance < 1000){

alert("Minimum Withdrawal Is 1000 UMJ");

return;

}

alert("Withdrawal Request Sent");

}

window.startInvestment = function(){

if(balance < 500){

alert("You Need 500 UMJ");

return;

}

balance -= 500;

updateBalance();

alert("Investment Started");

}

window.buyNFT = function(price){

if(balance < price){

alert("Not Enough UMJ");

return;

}

balance -= price;

updateBalance();

alert("NFT Purchased");

}

</script>

</body>
</html>
