

<!DOCTYPE html>
<html>
<head>
<title>UMJAR Mining</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
padding:0;
}

.header{
background:#111;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:gold;
border-bottom:2px solid gold;
}

.container{
padding:20px;
}

.card{
background:#111;
border:2px solid gold;
border-radius:20px;
padding:20px;
margin-top:20px;
box-shadow:0 0 20px gold;
}

.balance{
font-size:45px;
font-weight:bold;
color:gold;
margin-top:20px;
}

button{
background:gold;
color:black;
border:none;
padding:15px 30px;
font-size:20px;
border-radius:15px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
width:100%;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.box{
background:#1a1a1a;
padding:20px;
border-radius:15px;
text-align:center;
border:1px solid #333;
}

.small{
color:#aaa;
font-size:14px;
margin-top:10px;
}

.address{
background:#000;
padding:15px;
border-radius:15px;
margin-top:15px;
border:1px solid gold;
word-break:break-all;
color:gold;
font-size:13px;
}

</style>
</head>

<body>

<div class="header">
UMJAR Mining
</div>

<div class="container">

<div class="card">

<h2>Next Generation Mining Ecosystem</h2>

<p class="small">
Official UMJAR Token Address
</p>

<div class="address">
9dkUXhrrT9HFh1oKoED1wzdu3guNTzaKjh37U3n4pump
</div>

<div class="balance" id="balance">
245.85 UMJAR
</div>

<button onclick="startMining()">
Start Mining
</button>

<div class="grid">

<div class="box">
⚡
<p>Auto Mining</p>
</div>

<div class="box">
💎
<p>NFT Store</p>
</div>

<div class="box">
👥
<p>Referral</p>
</div>

<div class="box">
🔐
<p>Wallet Connect</p>
</div>

</div>

</div>

<div class="card">

<h2>Live Market</h2>

<p class="small">
UMJAR Price: $0.0025
</p>

<p class="small">
Users Online: 12,541
</p>

<p class="small">
Mining Speed: 2.5 UMJAR/hour
</p>

</div>

</div>

<script>

let balance = 245.85;
let mining = false;

function startMining(){

if(mining) return;

mining = true;

setInterval(() => {

balance += 0.01;

document.getElementById("balance").innerHTML =
balance.toFixed(2) + " UMJAR";

},1000);

}

</script>

</body>
</html>
