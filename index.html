<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UMJAR PREMIUM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
background-image:
radial-gradient(circle at top,#3a2a00,#000);
color:white;
padding:15px;
}

.app{
max-width:430px;
margin:auto;
padding-bottom:100px;
}

.top{
background:linear-gradient(145deg,#111,#1a1a1a);
border:1px solid rgba(255,215,0,0.3);
border-radius:35px;
padding:25px;
text-align:center;
box-shadow:0 0 35px rgba(255,215,0,0.15);
position:relative;
overflow:hidden;
}

.top::before{
content:"";
position:absolute;
width:220px;
height:220px;
background:rgba(255,215,0,0.08);
border-radius:50%;
top:-100px;
right:-100px;
}

.logo{
font-size:48px;
font-weight:bold;
color:gold;
letter-spacing:4px;
text-shadow:0 0 20px gold;
position:relative;
z-index:2;
}

.small{
margin-top:5px;
color:#ccc;
font-size:14px;
position:relative;
z-index:2;
}

.user{
margin-top:15px;
color:#00ff99;
font-size:14px;
position:relative;
z-index:2;
}

.input{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:18px;
background:#181818;
color:white;
font-size:15px;
border:1px solid rgba(255,215,0,0.2);
outline:none;
position:relative;
z-index:2;
}

.btn{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:22px;
font-size:17px;
font-weight:bold;
background:linear-gradient(145deg,#ffd700,#ffb700);
color:black;
box-shadow:0 0 20px rgba(255,215,0,0.4);
cursor:pointer;
transition:0.3s;
position:relative;
z-index:2;
}

.btn:hover{
transform:scale(1.03);
}

.balance{
font-size:55px;
font-weight:bold;
margin-top:25px;
color:#ffd700;
text-shadow:0 0 20px rgba(255,215,0,0.8);
position:relative;
z-index:2;
}

.circle{
width:190px;
height:190px;
border-radius:50%;
margin:25px auto;
background:conic-gradient(gold 0deg,#1b1b1b 0deg);
display:flex;
align-items:center;
justify-content:center;
box-shadow:
0 0 40px rgba(255,215,0,0.5),
inset 0 0 20px rgba(255,215,0,0.3);
animation:glow 2s infinite alternate;
position:relative;
}

.circle::before{
content:"";
position:absolute;
width:145px;
height:145px;
background:#000;
border-radius:50%;
}

.mineText{
position:relative;
z-index:2;
font-size:24px;
font-weight:bold;
color:gold;
}

.timer{
font-size:30px;
margin-top:15px;
color:gold;
}

.status{
margin-top:10px;
font-size:15px;
color:#00ff99;
}

.card{
background:#101010;
border:1px solid rgba(255,215,0,0.2);
padding:20px;
border-radius:30px;
margin-top:20px;
box-shadow:0 0 20px rgba(255,215,0,0.08);
}

.card h2{
color:gold;
margin-bottom:15px;
}

.row{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
max-width:430px;
margin:auto;
background:#111;
padding:15px;
display:flex;
justify-content:space-around;
border-radius:25px 25px 0 0;
border-top:1px solid rgba(255,215,0,0.2);
}

.nav div{
text-align:center;
font-size:13px;
color:gold;
}

@keyframes glow{

from{
box-shadow:
0 0 20px rgba(255,215,0,0.3);
}

to{
box-shadow:
0 0 55px rgba(255,215,0,0.8);
}

}

</style>
</head>

<body>

<div class="app">

<div class="top">

<div class="logo">
UMJAR
</div>

<div class="small">
PREMIUM REAL MINING
</div>

<div class="user" id="userEmail">
Not Logged In
</div>

<input class="input" type="email" id="email" placeholder="Email">

<input class="input" type="password" id="password" placeholder="Password">

<button class="btn" onclick="signup()">
SIGN UP
</button>

<button class="btn" onclick="login()">
LOGIN
</button>

<button class="btn" onclick="logout()">
LOGOUT
</button>

<div class="balance" id="balance">
0 UMJ
</div>

<div class="circle">
<div class="mineText">
MINING
</div>
</div>

<div class="timer" id="timer">
24:00:00
</div>

<div class="status" id="status">
Mining Not Started
</div>

<button class="btn" onclick="startMining()">
START MINING
</button>

<button class="btn" onclick="dailyBonus()">
DAILY BONUS
</button>

</div>

<div class="card">

<h2>WALLET</h2>

<div class="row">
<div>Balance</div>

<div id="walletBalance">
0 UMJ
</div>
</div>

<button class="btn" onclick="withdrawUMJ()">
WITHDRAW
</button>

</div>

<div class="card">

<h2>REFERRAL</h2>

<div id="refLink">
https://umjar.app/ref/UMJ001
</div>

<button class="btn" onclick="copyLink()">
COPY LINK
</button>

</div>

<div class="card">

<h2>INVESTMENT</h2>

<button class="btn" onclick="startInvestment()">
START INVESTMENT
</button>

</div>

<div class="card">

<h2>NFT MARKETPLACE</h2>

<button class="btn" onclick="buyNFT(500)">
BUY NFT
</button>

</div>

</div>

<div class="nav">

<div>
🏠<br>Home
</div>

<div>
⛏️<br>Mining
</div>

<div>
💰<br>Wallet
</div>

<div>
👤<br>Profile
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAmLTvCWirFSpbpEpQTDX-4p3JAarIr3R4",

authDomain: "umjar-mining.firebaseapp.com",

projectId: "umjar-mining",

storageBucket: "umjar-mining.firebasestorage.app",

messagingSenderId: "908328509401",

appId: "1:908328509401:web:7e7e8ceb078efe500c43c8"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then(()=>{

alert("Account Created");

})

.catch((error)=>{

alert(error.message);

});

}

window.login = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

alert("Login Successful");

})

.catch((error)=>{

alert(error.message);

});

}

window.logout = function(){

signOut(auth)

.then(()=>{

alert("Logged Out");

});

}

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("userEmail").innerHTML =
user.email;

}else{

document.getElementById("userEmail").innerHTML =
"Not Logged In";

}

});

let balance =
parseInt(localStorage.getItem("umjarBalance")) || 0;

let mining =
localStorage.getItem("mining") === "true";

let miningTime =
parseInt(localStorage.getItem("miningTime")) || 86400;

let miningInterval = null;
let timerInterval = null;

updateBalance();
updateTimer();

if(mining){

document.getElementById("status").innerHTML =
"Mining Active";

startIntervals();

}

function updateBalance(){

document.getElementById("balance").innerHTML =
balance + " UMJ";

document.getElementById("walletBalance").innerHTML =
balance + " UMJ";

localStorage.setItem("umjarBalance",balance);

}

function updateTimer(){

let h =
Math.floor(miningTime/3600);

let m =
Math.floor((miningTime%3600)/60);

let s =
miningTime%60;

document.getElementById("timer").innerHTML =
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

}

window.startMining = function(){

if(mining){

alert("Mining Already Running");

return;

}

mining = true;

localStorage.setItem("mining","true");

document.getElementById("status").innerHTML =
"Mining Active";

startIntervals();

}

function startIntervals(){

clearInterval(miningInterval);
clearInterval(timerInterval);

miningInterval = setInterval(()=>{

balance += 2;

updateBalance();

},5000);

timerInterval = setInterval(()=>{

if(miningTime <= 0){

clearInterval(miningInterval);
clearInterval(timerInterval);

mining = false;

localStorage.setItem("mining","false");

document.getElementById("status").innerHTML =
"Mining Finished";

return;

}

miningTime--;

localStorage.setItem("miningTime",miningTime);

updateTimer();

},1000);

}

window.dailyBonus = function(){

balance += 100;

updateBalance();

alert("100 UMJ Added");

}

window.copyLink = function(){

navigator.clipboard.writeText(
document.getElementById("refLink").innerText
);

alert("Referral Link Copied");

}

window.startInvestment = function(){

if(balance < 500){

alert("You Need 500 UMJ");

return;

}

balance -= 500;

updateBalance();

alert("Investment Started");

}

window.buyNFT = function(price){

if(balance < price){

alert("Not Enough UMJ");

return;

}

balance -= price;

updateBalance();

alert("NFT Purchased");

}

window.withdrawUMJ = function(){

if(balance < 1000){

alert("Minimum Withdrawal Is 1000 UMJ");

return;

}

alert("Withdrawal Request Sent");

}

</script>

</body>
</html>
