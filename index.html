<!-- KA MAYE GURBIN <style> DINKA DA WANNAN KAWAI -->

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0d0d0d;
background-image:
linear-gradient(to bottom,#1c1400,#0d0d0d);
color:white;
padding:15px;
}

.app{
max-width:430px;
margin:auto;
padding-bottom:100px;
}

.box{
background:rgba(24,24,24,0.96);
backdrop-filter:blur(10px);
border:1px solid rgba(255,215,0,0.12);
border-radius:32px;
padding:22px;
margin-top:20px;
box-shadow:0 0 25px rgba(255,215,0,0.05);
}

.logo{
font-size:54px;
font-weight:bold;
text-align:center;
color:#ffd700;
letter-spacing:4px;
text-shadow:0 0 20px rgba(255,215,0,0.45);
}

h3{
text-align:center;
margin-top:5px;
font-weight:normal;
color:#ddd;
}

.user{
margin-top:15px;
text-align:center;
color:#00ff99;
font-size:14px;
}

input{
width:100%;
padding:16px;
margin-top:14px;
border:none;
outline:none;
border-radius:18px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,215,0,0.1);
color:white;
font-size:15px;
}

button{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:22px;
background:linear-gradient(145deg,#ffd700,#ffb300);
color:black;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(255,215,0,0.2);
}

button:hover{
transform:scale(1.02);
}

.balance{
font-size:58px;
font-weight:bold;
text-align:center;
margin-top:25px;
color:#ffd700;
}

.timer{
font-size:32px;
text-align:center;
margin-top:20px;
color:#ffd700;
}

.status{
margin-top:10px;
text-align:center;
color:#00ff99;
font-size:15px;
}

.circle{
width:190px;
height:190px;
margin:28px auto;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
background:
conic-gradient(#ffd700 0deg,#2a2a2a 0deg);
position:relative;
box-shadow:
0 0 35px rgba(255,215,0,0.22);
}

.circle::before{
content:"";
position:absolute;
width:145px;
height:145px;
background:#101010;
border-radius:50%;
}

.circleText{
position:relative;
z-index:2;
font-size:22px;
font-weight:bold;
color:#ffd700;
}

.row{
display:flex;
justify-content:space-between;
margin-top:12px;
}

.green{
color:#00ff99;
font-weight:bold;
}

.banner{
margin-top:20px;
padding:24px;
border-radius:30px;
background:
linear-gradient(to right,#2a1f00,#141414);
border:1px solid rgba(255,215,0,0.12);
}

.banner h2{
color:#ffd700;
margin-bottom:10px;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
max-width:430px;
margin:auto;
background:rgba(20,20,20,0.98);
padding:16px;
display:flex;
justify-content:space-around;
border-radius:28px 28px 0 0;
border-top:1px solid rgba(255,215,0,0.1);
backdrop-filter:blur(12px);
}

.nav div{
text-align:center;
font-size:13px;
color:#ffd700;
}

</style>

</div>

</div>
