<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMJAR Mining</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
padding:20px;
margin:0;
}

.app{
max-width:420px;
margin:auto;
}

.box{
background:#111;
border:2px solid gold;
border-radius:25px;
padding:20px;
margin-top:20px;
text-align:center;
}

.logo{
font-size:50px;
font-weight:bold;
color:gold;
}

.balance{
font-size:45px;
margin-top:20px;
}

.timer{
font-size:25px;
color:gold;
margin-top:10px;
}

.status{
color:#00ff66;
margin-top:10px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:20px;
background:gold;
color:black;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="app">

<div class="box">

<div class="logo">
UMJAR
</div>

<h3>REAL CRYPTO MINING</h3>

<div class="balance" id="balance">
0 UMJ
</div>

<div class="timer" id="timer">
24:00:00
</div>

<div class="status" id="status">
Mining Not Started
</div>

<button onclick="startMining()">
START MINING
</button>

<button onclick="dailyBonus()">
DAILY BONUS
</button>

</div>

<div class="box">

<h2>UMJAR MALL</h2>

<button onclick="openMall()">
OPEN MALL
</button>

</div>

<div class="box">

<h2>INVESTMENT</h2>

<button onclick="startInvestment()">
START INVESTMENT
</button>

</div>

<div class="box">

<h2>NFT MARKETPLACE</h2>

<button onclick="buyNFT(500)">
BUY NFT
</button>

</div>

<div class="box">

<h2>REFERRAL</h2>

<div id="refLink">
https://umjar.app/ref/UMJ001
</div>

<button onclick="copyLink()">
COPY LINK
</button>

</div>

<div class="box">

<h2>WALLET</h2>

<div>
Balance:
<span id="walletBalance">
0
</span>
UMJ
</div>

<button onclick="withdrawUMJ()">
WITHDRAW
</button>

</div>

</div>

<script>

let balance =
parseInt(localStorage.getItem("umjarBalance")) || 0;

let mining =
localStorage.getItem("mining") === "true";

let miningTime =
parseInt(localStorage.getItem("miningTime")) || 86400;

let miningInterval = null;
let timerInterval = null;

updateBalance();
updateTimer();

if(mining){
document.getElementById("status").innerHTML =
"Mining Active";
startIntervals();
}

function updateBalance(){

if(isNaN(balance)){
balance = 0;
}

document.getElementById("balance").innerHTML =
balance + " UMJ";

document.getElementById("walletBalance").innerHTML =
balance;

localStorage.setItem("umjarBalance", balance);

}

function updateTimer(){

let hours =
Math.floor(miningTime / 3600);

let minutes =
Math.floor((miningTime % 3600) / 60);

let seconds =
miningTime % 60;

document.getElementById("timer").innerHTML =
String(hours).padStart(2,"0") + ":" +
String(minutes).padStart(2,"0") + ":" +
String(seconds).padStart(2,"0");

}

function startMining(){

if(mining){
alert("Mining Already Running");
return;
}

mining = true;

document.getElementById("status").innerHTML =
"Mining Active";

startIntervals();

}

function startIntervals(){

clearInterval(miningInterval);
clearInterval(timerInterval);

miningInterval = setInterval(function(){

balance += 2;

updateBalance();

},5000);

timerInterval = setInterval(function(){

if(miningTime <= 0){

clearInterval(miningInterval);
clearInterval(timerInterval);

mining = false;

document.getElementById("status").innerHTML =
"Mining Finished";

return;

}

miningTime--;

localStorage.setItem("miningTime", miningTime);

updateTimer();

},1000);

}

function dailyBonus(){

balance += 100;

updateBalance();

alert("100 UMJ Added");

}

function openMall(){

alert("UMJAR Mall Opened");

}

function startInvestment(){

if(balance < 500){

alert("You Need 500 UMJ");

return;

}

balance -= 500;

updateBalance();

alert("Investment Started");

}

function buyNFT(price){

if(balance < price){

alert("Not Enough UMJ");

return;

}

balance -= price;

updateBalance();

alert("NFT Purchased");

}

function copyLink(){

let text =
document.getElementById("refLink").innerText;

navigator.clipboard.writeText(text);

alert("Referral Link Copied");

}

function withdrawUMJ(){

if(balance < 1000){

alert("Minimum Withdrawal Is 1000 UMJ");

return;

}

alert("Withdrawal Request Sent");

}

</script>

</body>
</html>
